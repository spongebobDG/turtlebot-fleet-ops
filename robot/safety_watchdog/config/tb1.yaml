safety_watchdog_policy:
  ros__parameters:
    input_topic: /safety/cmd_vel_in
    output_topic: /safety/watchdog_cmd_vel
    status_topic: /fleet/safety_status
    estop_service: /safety_watchdog/set_estop
    guard_restart_topic: /safety/watchdog_guard_restarted
    robot_id: tb1
    timeout_sec: 0.5
    max_linear_x: 0.05
    max_angular_z: 0.3
    neutral_epsilon: 0.001
    publish_rate_hz: 20.0
    status_publish_rate_hz: 2.0

safety_watchdog:
  ros__parameters:
    input_topic: /safety/watchdog_cmd_vel
    output_topic: /cmd_vel
    restart_topic: /safety/watchdog_guard_restarted
    timeout_sec: 0.25
    max_linear_x: 0.05
    max_angular_z: 0.3
    neutral_epsilon: 0.001
    publish_rate_hz: 20.0
