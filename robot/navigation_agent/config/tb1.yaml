navigation_agent:
  ros__parameters:
    robot_id: tb1
    command_action: /tb1/navigation/navigate
    lease_topic: /fleet/navigation_lease
    status_topic: /fleet/navigation_status
    robot_status_topic: /fleet/robot_status
    safety_status_topic: /fleet/safety_status
    initial_pose_service: /tb1/navigation/set_initial_pose
    motion_mode_service: /tb1/navigation/set_motion_mode
    authorization_topic: /navigation/motion_authorized
    nav2_action: /navigate_to_pose
    nav2_cancel_service: /navigate_to_pose/_action/cancel_goal
    nav2_lifecycle_service: /bt_navigator/get_state
    initial_pose_topic: /initialpose
    amcl_pose_topic: /amcl_pose
    map_topic: /map
    lease_timeout_sec: 2.0
    nav2_unavailable_timeout_sec: 1.0
    goal_progress_timeout_sec: 20.0
    goal_feedback_timeout_sec: 3.0
    goal_max_duration_sec: 180.0
    goal_distance_progress_m: 0.05
    goal_yaw_progress_rad: 0.1
    # 0.14m TB1 footprint radius + 0.02m narrow-passage clearance.
    navigation_min_clearance_m: 0.16
    robot_status_timeout_sec: 3.0
    safety_status_timeout_sec: 1.5
    authorization_rate_hz: 10.0
    status_rate_hz: 2.0
    map_free_value_max: 0

motion_arbiter:
  ros__parameters:
    manual_input_topic: /motion/manual/cmd_vel
    navigation_input_topic: /motion/navigation/cmd_vel
    output_topic: /safety/cmd_vel_in
    authorization_topic: /navigation/motion_authorized
    mode_service: /tb1/navigation/set_motion_mode
    default_mode: 0
    input_timeout_sec: 0.5
    authorization_timeout_sec: 0.5
    publish_rate_hz: 20.0

manual_control:
  ros__parameters:
    command_service: /tb1/navigation/manual_command
    manual_output_topic: /motion/manual/cmd_vel
    motion_mode_service: /tb1/navigation/set_motion_mode
    command_timeout_sec: 0.35
    publish_rate_hz: 20.0
    max_linear_x: 0.05
    max_angular_z: 0.3

profile_manager:
  ros__parameters:
    robot_id: tb1
    status_topic: /fleet/mapping_status
    profile_service: /tb1/navigation/set_operating_profile
    save_map_service: /tb1/navigation/save_map
    mapping_unit: tb1-mapping.service
    navigation_unit: tb1-navigation.service
    map_file: ~/.local/share/turtlebot-fleet-ops/maps/tb1/map.yaml
    save_map_script: ~/turtlebot-fleet-ops/infra/navigation/save-tb1-map.sh
    status_rate_hz: 1.0
