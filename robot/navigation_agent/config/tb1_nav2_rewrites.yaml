# Repository-owned overlay applied to the TurtleBot3 Humble Burger baseline.
base_frame_id: base_footprint
odom_frame_id: odom
global_frame_id: map
robot_base_frame: base_link
scan_topic: /scan_normalized
odom_topic: /odom
# The TurtleBot3 Humble baseline ticks the behavior tree every 10 ms.  On TB1
# this causes log storms and controller deadline misses during recovery.  A
# 10 Hz tree is still faster than the low-speed controller needs and leaves
# CPU headroom for AMCL, costmaps, the safety path, and Zenoh.
bt_loop_duration: 100
# The Burger baseline's 20 ms BT action/service acknowledgement timeout is
# shorter than the response jitter measured on TB1 under costmap load. Keep
# lease and watchdog deadlines unchanged, but allow Nav2 servers two seconds
# to acknowledge before the tree starts a recovery behavior.
default_server_timeout: 2000
# TB1 missed the 10 Hz deadline while evaluating the Burger baseline's 800
# DWB trajectories per tick. At 0.05 m/s, 5 Hz advances at most 1 cm per
# control tick; the dedicated 20 Hz smoother still provides continuous output.
controller_frequency: 5.0
debug_trajectory_details: false
vx_samples: 10
vtheta_samples: 20
sim_time: 1.0
max_vel_x: 0.05
max_speed_xy: 0.05
max_vel_theta: 0.3
max_rotational_vel: 0.3
min_rotational_vel: 0.05
# DWB uses min_speed_xy/min_speed_theta rather than the behavior-server
# min_rotational_vel parameter. Commands below these measured TB1 drive
# deadbands reached /cmd_vel but did not turn the wheels.
min_speed_xy: 0.02
min_speed_theta: 0.05
acc_lim_x: 0.08
acc_lim_theta: 0.6
decel_lim_x: -0.12
decel_lim_theta: -0.8
trans_stopped_velocity: 0.01
required_movement_radius: 0.1
movement_time_allowance: 20.0
# The saved TB1 map has 0.05 m cells and the robot is intentionally limited to
# 0.05 m/s.  The TurtleBot3 defaults only update AMCL after 0.25 m and accept a
# goal within 0.25 m, which can skip localization updates and treat short web
# goals as successful without moving.  Update at one map cell and require a
# two-cell position tolerance instead.  A three-degree AMCL angular threshold
# also keeps map->odom current while the base performs slow goal rotations.
update_min_d: 0.05
update_min_a: 0.05
robot_radius: 0.14
xy_goal_tolerance: 0.10
yaw_goal_tolerance: 0.15
