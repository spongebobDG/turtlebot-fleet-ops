fleet_gateway:
  ros__parameters:
    status_topic: /fleet/robot_status
    navigation_status_topic: /fleet/navigation_status
    safety_status_topic: /fleet/safety_status
    mapping_status_topic: /fleet/mapping_status
    navigation_lease_topic: /fleet/navigation_lease
    online_timeout_sec: 3.0
    web_host: 0.0.0.0
    web_port: 8000
    lease_publish_interval_sec: 0.5
    navigation_confirmation_timeout_sec: 2.0
    robot_ids:
      - tb1
    estop_services:
      - /safety_watchdog/set_estop
    navigation_actions:
      - /tb1/navigation/navigate
    initial_pose_services:
      - /tb1/navigation/set_initial_pose
    manual_command_services:
      - /tb1/navigation/manual_command
    operating_profile_services:
      - /tb1/navigation/set_operating_profile
    save_map_services:
      - /tb1/navigation/save_map
    map_topics:
      - /map
    web_telemetry_topics:
      - /fleet/web_telemetry
    scan_topics:
      - /scan
    scan_sensor_x_m:
      - -0.032
    scan_sensor_y_m:
      - 0.0
    scan_sensor_yaw_rad:
      # The raw LDS-02 scan reports angle zero opposite base_link +X.
      - 3.141592653589793
    map_pose_target_frames:
      - map
    map_pose_source_frames:
      - base_footprint
