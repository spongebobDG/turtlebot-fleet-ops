fleet_gateway:
  ros__parameters:
    status_topic: /fleet/robot_status
    navigation_status_topic: /fleet/navigation_status
    safety_status_topic: /fleet/safety_status
    navigation_lease_topic: /fleet/navigation_lease
    online_timeout_sec: 3.0
    web_host: 0.0.0.0
    web_port: 8000
    lease_publish_interval_sec: 0.5
    navigation_confirmation_timeout_sec: 2.0
    robot_ids:
      - tb1
    estop_services:
      - /safety_watchdog/set_estop
    navigation_actions:
      - /tb1/navigation/navigate
    initial_pose_services:
      - /tb1/navigation/set_initial_pose
    map_topics:
      - /map
    scan_topics:
      - /scan
    scan_sensor_x_m:
      - -0.032
    scan_sensor_y_m:
      - 0.0
    scan_sensor_yaw_rad:
      # Keep the web raw-scan overlay in the same base_link +X convention.
      - 3.141592653589793
