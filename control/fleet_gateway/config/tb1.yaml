fleet_gateway:
  ros__parameters:
    status_topic: /fleet/robot_status
    online_timeout_sec: 3.0
    web_host: 0.0.0.0
    web_port: 8000
    robot_ids:
      - tb1
    estop_services:
      - /safety_watchdog/set_estop
    estop_status_topics:
      - /safety/estop_active
    estop_status_max_age_sec: 2.0
    navigation_actions:
      - /navigate_to_pose
    navigation_server_wait_sec: 1.0
    navigation_response_wait_sec: 3.0
